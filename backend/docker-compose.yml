services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: mexit
    ports:
      - "5432:5432"
    volumes:
      - mexit_postgres_data:/var/lib/postgresql/data

  backend:
    build: .
    env_file: .env
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/mexit
    ports:
      - "8000:8000"
    volumes:
      - ./app:/code/app
    depends_on:
      - postgres

volumes:
  mexit_postgres_data:
